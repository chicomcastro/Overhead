<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#16203a"/>
      <stop offset="100%" stop-color="#0b0f1a"/>
    </radialGradient>
    <linearGradient id="sphere" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6ee7ff"/>
      <stop offset="100%" stop-color="#b388ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6ee7ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#6ee7ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- halo -->
  <circle cx="256" cy="256" r="150" fill="url(#glow)"/>
  <!-- órbitas / nós -->
  <circle cx="256" cy="256" r="120" fill="none" stroke="#6ee7ff" stroke-opacity="0.35" stroke-width="4" stroke-dasharray="10 12"/>
  <circle cx="376" cy="256" r="10" fill="#b388ff"/>
  <circle cx="196" cy="152" r="9" fill="#6ee7ff"/>
  <circle cx="170" cy="350" r="9" fill="#ffd166"/>
  <!-- núcleo (esfera) -->
  <circle cx="256" cy="256" r="74" fill="url(#sphere)"/>
  <circle cx="256" cy="256" r="74" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="3"/>
  <circle cx="232" cy="232" r="22" fill="#ffffff" fill-opacity="0.35"/>
</svg>
